<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675" role="img" aria-label="Choosing the Right General Contractor">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#722b32"/>
      <stop offset="1" stop-color="#5a2128"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#bg3)"/>
  <circle cx="1000" cy="160" r="210" fill="#ffa311" opacity="0.16"/>
  <circle cx="1060" cy="560" r="140" fill="#ffa311" opacity="0.10"/>
  <!-- hard hat + checklist motif -->
  <g transform="translate(860,250)" stroke="#ffa311" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M20 180 H220 a20 20 0 0 0 20 -20 H0 a20 20 0 0 0 20 20 Z"/>
    <path d="M40 160 q60 -120 160 0" fill="#ffa311" fill-opacity="0.18"/>
    <path d="M70 160 v-30 M120 160 v-44 M170 160 v-30"/>
    <!-- checklist -->
    <rect x="250" y="40" width="120" height="150" rx="8"/>
    <path d="M270 70 h70 M270 100 h70 M270 130 h50"/>
    <path d="M250 70 l8 8 l14 -16" stroke="#ffd9a0"/>
  </g>
  <text x="80" y="120" font-family="Helvetica Neue, Arial, sans-serif" font-size="22" font-weight="700" letter-spacing="3" fill="#ffa311">RED&#8217;S RRC &#183; BLOG</text>
  <rect x="80" y="150" width="64" height="5" fill="#ffa311"/>
  <text x="80" y="300" font-family="Helvetica Neue, Arial, sans-serif" font-size="54" font-weight="800" fill="#ffffff">Choosing the Right</text>
  <text x="80" y="370" font-family="Helvetica Neue, Arial, sans-serif" font-size="54" font-weight="800" fill="#ffffff">General Contractor</text>
  <text x="80" y="430" font-family="Helvetica Neue, Arial, sans-serif" font-size="30" font-weight="500" fill="#ffd9a0">A trust-based checklist</text>
</svg>
