<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800" role="img" aria-label="Kitchen renovation project">
  <defs>
    <linearGradient id="cp1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#722b32"/>
      <stop offset="1" stop-color="#3a1419"/>
    </linearGradient>
  </defs>
  <rect width="800" height="800" fill="url(#cp1)"/>
  <circle cx="660" cy="140" r="140" fill="#ffa311" opacity="0.12"/>
  <!-- kitchen: cabinets + counter + island -->
  <g stroke="#ffa311" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- back wall cabinets -->
    <rect x="80" y="120" width="640" height="240"/>
    <path d="M240 120 V360 M400 120 V360 M560 120 V360"/>
    <!-- counter -->
    <rect x="80" y="360" width="640" height="30" fill="#ffa311" fill-opacity="0.2"/>
    <!-- island -->
    <rect x="240" y="480" width="320" height="160" rx="8"/>
    <path d="M400 480 V640"/>
    <!-- pendant lights -->
    <path d="M300 0 V80 M500 0 V80" stroke-dasharray="4 4" opacity="0.5"/>
    <circle cx="300" cy="100" r="20" fill="#ffa311" fill-opacity="0.3"/>
    <circle cx="500" cy="100" r="20" fill="#ffa311" fill-opacity="0.3"/>
  </g>
</svg>
