<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800" role="img" aria-label="Construction Planning">
  <defs>
    <linearGradient id="sp1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#722b32"/>
      <stop offset="1" stop-color="#3a1419"/>
    </linearGradient>
  </defs>
  <rect width="800" height="800" fill="url(#sp1)"/>
  <circle cx="640" cy="160" r="160" fill="#ffa311" opacity="0.14"/>
  <!-- blueprint grid -->
  <g stroke="#ffa311" stroke-width="1.5" opacity="0.25">
    <path d="M80 80 H720 M80 240 H720 M80 400 H720 M80 560 H720 M80 720 H720"/>
    <path d="M80 80 V720 M240 80 V720 M400 80 V720 M560 80 V720 M720 80 V720"/>
  </g>
  <!-- blueprint house outline -->
  <g stroke="#ffa311" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M200 460 V280 L400 140 L600 280 V460"/>
    <path d="M200 460 H600"/>
    <path d="M340 460 V340 H460 V460"/>
    <path d="M340 340 H460"/>
    <!-- dimension lines -->
    <path d="M200 520 H600" stroke-dasharray="6 6" opacity="0.6"/>
    <path d="M200 510 V530 M600 510 V530" opacity="0.6"/>
    <!-- pencil -->
    <g transform="translate(560,560) rotate(45)">
      <rect x="0" y="0" width="120" height="24" fill="#ffa311" stroke="none"/>
      <path d="M120 0 L150 12 L120 24 Z" fill="#ffd9a0" stroke="none"/>
    </g>
  </g>
</svg>
