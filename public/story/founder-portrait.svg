<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400" role="img" aria-label="Founder portrait">
  <defs>
    <linearGradient id="fp1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5a2128"/>
      <stop offset="1" stop-color="#3a1419"/>
    </linearGradient>
    <clipPath id="fpclip"><circle cx="200" cy="200" r="196"/></clipPath>
  </defs>
  <circle cx="200" cy="200" r="196" fill="url(#fp1)"/>
  <circle cx="200" cy="200" r="196" fill="none" stroke="#ffa311" stroke-width="4"/>
  <g clip-path="url(#fpclip)">
    <!-- shoulders -->
    <path d="M60 400 Q200 260 340 400 Z" fill="#722b32"/>
    <!-- head -->
    <circle cx="200" cy="190" r="70" fill="#e8c9a0"/>
    <!-- hair -->
    <path d="M130 180 Q200 90 270 180 Q270 140 200 120 Q130 140 130 180 Z" fill="#3a2418"/>
    <!-- subtle smile -->
    <path d="M180 210 Q200 222 220 210" stroke="#722b32" stroke-width="3" fill="none" stroke-linecap="round"/>
    <!-- collar -->
    <path d="M160 280 L200 300 L240 280" stroke="#ffa311" stroke-width="3" fill="none"/>
  </g>
</svg>
